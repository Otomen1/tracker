<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Expense Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #18181b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      text-align: center;
      max-width: 320px;
    }
    .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1rem;
      opacity: 0.3;
    }
    h1 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #71717a; margin-bottom: 1.5rem; }
    button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border: 1px solid #e4e4e7;
      border-radius: 0.375rem;
      background: #fff;
      font-size: 0.875rem;
      cursor: pointer;
    }
    button:hover { background: #f4f4f5; }
    @media (prefers-color-scheme: dark) {
      body { background: #09090b; color: #fafafa; }
      button { background: #18181b; border-color: #27272a; color: #fafafa; }
      button:hover { background: #27272a; }
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728M5.636 5.636a9 9 0 000 12.728M12 12h.01M9 12a3 3 0 106 0 3 3 0 00-6 0" />
    </svg>
    <h1>You're offline</h1>
    <p>Check your connection and try again. Your data is safe and will sync when you're back online.</p>
    <button onclick="location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Try again
    </button>
  </div>
</body>
</html>
